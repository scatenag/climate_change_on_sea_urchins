name: Auto-update data

on:
  schedule:
    # Daily at 06:00 UTC — checks for new EC50 on Google Sheets
    - cron: "0 6 * * *"
    # Monthly on the 5th at 07:00 UTC — updates Copernicus env data
    - cron: "0 7 5 * *"
  workflow_dispatch:  # allow manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── Step 1: EC50 from Google Sheets (daily) ──────────────────────────────
      - name: Fetch EC50 from Google Sheets
        run: python scripts/fetch_ec50.py

      - name: Check if EC50 data changed
        id: check_ec50
        run: |
          if git diff --quiet data/ec50_sheets.csv; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      # ── Step 2: Copernicus env data (monthly — 5th of each month) ────────────
      - name: Check if today is the monthly Copernicus update day
        id: check_monthly
        run: |
          DAY=$(date +%d)
          if [ "$DAY" = "05" ]; then
            echo "run_copernicus=true" >> $GITHUB_OUTPUT
          else
            echo "run_copernicus=false" >> $GITHUB_OUTPUT
          fi

      - name: Install Copernicus Marine dependencies
        if: steps.check_monthly.outputs.run_copernicus == 'true'
        run: pip install copernicusmarine xarray netcdf4 h5netcdf

      - name: Update Copernicus environmental data (incremental)
        if: steps.check_monthly.outputs.run_copernicus == 'true'
        env:
          COPERNICUSMARINE_SERVICE_USERNAME: ${{ secrets.COPERNICUSMARINE_SERVICE_USERNAME }}
          COPERNICUSMARINE_SERVICE_PASSWORD: ${{ secrets.COPERNICUSMARINE_SERVICE_PASSWORD }}
        run: python scripts/fetch_copernicus_update.py

      # Full re-fetch (not incremental) of the daily SST cache used for MHW
      # detection. Runs on the same monthly cadence as the env-variable
      # update above, right alongside it, specifically so the two can never
      # fall out of sync again the way they did between 2026-03 and 2026-07
      # (see drafts/nuova pubblicazione/refresh_dati_copernicus_2026-07-18.md).
      - name: Update daily SST cache for MHW detection
        if: steps.check_monthly.outputs.run_copernicus == 'true'
        env:
          COPERNICUSMARINE_SERVICE_USERNAME: ${{ secrets.COPERNICUSMARINE_SERVICE_USERNAME }}
          COPERNICUSMARINE_SERVICE_PASSWORD: ${{ secrets.COPERNICUSMARINE_SERVICE_PASSWORD }}
        run: python scripts/fetch_copernicus_daily.py

      - name: Check if Copernicus data changed
        id: check_copernicus
        run: |
          if git diff --quiet data/env_copernicus.csv data/sst_daily.csv; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      # ── Step 3: Rebuild dataset + analysis (if anything changed) ─────────────
      # ccsu-run-pipeline regenerates the MHW catalogue (data/mhw_events.csv
      # etc.) from data/sst_daily.csv as its own first step — no separate
      # MHW-detection call needed here.
      - name: Rebuild dataset and re-run Python analysis
        if: >
          steps.check_ec50.outputs.changed == 'true' ||
          steps.check_copernicus.outputs.changed == 'true'
        run: |
          python scripts/build_dataset.py
          python -m climate_change_on_sea_urchins.pipeline

      # ── Step 3b: DLNM (R) — same trigger, kept in sync automatically ─────────
      - name: Set up R
        if: >
          steps.check_ec50.outputs.changed == 'true' ||
          steps.check_copernicus.outputs.changed == 'true'
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R packages for DLNM
        if: >
          steps.check_ec50.outputs.changed == 'true' ||
          steps.check_copernicus.outputs.changed == 'true'
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::dlnm
            any::mgcv
            any::dplyr
            any::readr

      - name: Run DLNM analysis (R)
        if: >
          steps.check_ec50.outputs.changed == 'true' ||
          steps.check_copernicus.outputs.changed == 'true'
        run: Rscript scripts/mhw_lag_analysis.R

      # ── Step 4: Commit and push ───────────────────────────────────────────────
      - name: Commit and push updated results
        if: >
          steps.check_ec50.outputs.changed == 'true' ||
          steps.check_copernicus.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ec50_sheets.csv data/data_extended.csv data/data_ec50_ci.csv \
                  data/env_copernicus.csv data/sst_daily.csv \
                  data/mhw_events.csv data/mhw_monthly.csv data/mhw_annual.csv \
                  results/
          git diff --cached --quiet || git commit -m "Auto-update: env+EC50+SST data, Python+R analysis [skip ci]"
          git push origin main
