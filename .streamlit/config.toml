[theme]
primaryColor = "#0077b6"
backgroundColor = "#f8f9fa"
secondaryBackgroundColor = "#e9ecef"
textColor = "#212529"
font = "sans serif"

[server]
headless = true
enableXsrfProtection = true
# enableCORS is intentionally omitted: Streamlit silently forces it back to
# true whenever enableXsrfProtection is true, so setting it to false here
# was a no-op that just obscured the actual (CORS-enabled) behavior.

[browser]
gatherUsageStats = false

[runner]
# Neither setting below turned out to be the cause of the blank-page bug
# (root cause: app.py's import of the dashboard package was cached after
# the first run, see app.py's comment) -- kept anyway as cheap, low-risk
# hygiene since testing showed no downside.
postScriptGC = false  # skip the full gc.collect(2) Streamlit runs after every script
fastReruns = false    # avoid Streamlit's documented "can lead to race conditions" rerun path
